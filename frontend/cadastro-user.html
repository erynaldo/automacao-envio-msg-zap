<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center text-white">
    <div class="w-full max-w-md bg-slate-900/70 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <h1 class="text-4xl font-black mb-8">Cadastrar novo usuário</h1>
        <div class="space-y-5">
            <input type="text" id="nome" placeholder="Nome"
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4">
            <input type="email" id="email" placeholder="E-mail"
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4">
            <input type="password" id="senha" placeholder="Senha"
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4">
            <button onclick="cadastrar()"
                class="w-full bg-emerald-500 hover:bg-emerald-400 transition-all text-slate-950 font-bold py-4 rounded-2xl">
                Criar Conta
            </button>
            <a href="/index.html" class="block text-center text-cyan-400 hover:text-cyan-300">
                Já tenho conta
            </a>
        </div>
    </div>
    <script>
        async function cadastrar() {
            const nome = document.getElementById('nome').value
            const email = document.getElementById('email').value
            const senha = document.getElementById('senha').value
            try {
                const response = await fetch('/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                })
                const data = await response.json()
                if (data.success) {
                    alert('Cadastro realizado!')
                    window.location.href = '/index.html'
                } else {
                    alert(data.error)
                }
            } catch (err) {
                alert('Erro de conexão com o servidor')
            }
        }
    </script>
</body>
</html>
