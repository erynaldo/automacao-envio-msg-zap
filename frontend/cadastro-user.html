<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Usuário</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 flex items-center justify-center text-white">
    <div id="toastContainer" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-900/70 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl">
        <h1 class="text-4xl font-black mb-8">Cadastrar novo usuário</h1>
        <div class="space-y-5">
            <input type="text" id="nome" placeholder="Nome"
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4">
            <input type="email" id="email" placeholder="E-mail"
                class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4">

            <div class="relative mb-2">
                <input type="password" id="senha" placeholder="Senha"
                    class="w-full bg-slate-950 border border-slate-700 rounded-2xl p-4 pr-14">
                <button type="button" id="toggleSenha" aria-label="Mostrar senha"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-2xl px-2">
                    👁️
                </button>
            </div>
            <p class="mt-1 text-yellow-300 tracking-wide">Exiba a senha, afim de verificar se você digitou a senha
                desejada</p>

            <button onclick="cadastrar()"
                class="w-full bg-emerald-500 hover:bg-emerald-400 transition-all text-slate-950 font-bold py-4 rounded-2xl">
                Criar Conta
            </button>
            <a href="/login.html" class="block text-center text-cyan-400 hover:text-cyan-300">
                Já tenho conta
            </a>
        </div>
    </div>
    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer')
            const colors = {
                success: 'bg-emerald-500 text-slate-950',
                error: 'bg-red-500 text-white',
                info: 'bg-cyan-500 text-slate-950'
            }
            const toast = document.createElement('div')
            toast.className = `pointer-events-auto ${colors[type] || colors.info} font-bold px-5 py-3 rounded-2xl shadow-2xl transition-all duration-300 transform translate-x-6 opacity-0`
            toast.textContent = message
            container.appendChild(toast)
            requestAnimationFrame(() => toast.classList.remove('translate-x-6', 'opacity-0'))
            setTimeout(() => {
                toast.classList.add('translate-x-6', 'opacity-0')
                setTimeout(() => toast.remove(), 300)
            }, 3000)
        }

        const senhaInput = document.getElementById('senha')
        const toggleSenha = document.getElementById('toggleSenha')
        toggleSenha.addEventListener('click', () => {
            const mostrar = senhaInput.type === 'password'
            senhaInput.type = mostrar ? 'text' : 'password'
            toggleSenha.textContent = mostrar ? '🙈' : '👁️'
            toggleSenha.setAttribute('aria-label', mostrar ? 'Ocultar senha' : 'Mostrar senha')
        })

        async function cadastrar() {
            const nome = document.getElementById('nome').value
            const email = document.getElementById('email').value
            const senha = document.getElementById('senha').value
            try {
                const response = await fetch('/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                })
                const data = await response.json()
                if (data.success) {
                    // alert('Cadastro realizado!')
                    // window.location.href = '/index.html'
                    showToast('✅ Cadastro realizado!', 'success')
                    setTimeout(() => window.location.href = '/login.html', 1200)
                } else {
                    alert(data.error)
                    showToast(data.error || 'Erro no cadastro', 'error')
                }
            } catch (err) {
                alert('Erro de conexão com o servidor')
                showToast('Erro de conexão com o servidor', 'error')
            }
        }
    </script>
</body>

</html>
